<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>แบบประเมินคำนวณธาตุและจักรราศีกำเนิด/ปฏิสนธิ</title>
    <style>
        * { box-sizing: border-box; font-family: 'Sarabun', sans-serif; }
        body { background-color: #f0f4f8; margin: 0; padding: 20px; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .container { background-color: #ffffff; padding: 30px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.15); width: 100%; max-width: 600px; }
        h2 { color: #2c3e50; text-align: center; margin-bottom: 25px; border-bottom: 3px solid #dbb234; padding-bottom: 10px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; font-weight: bold; margin-bottom: 8px; color: #34495e; }
        input[type="date"], input[type="time"], input[type="number"] { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 6px; font-size: 16px; }
        .radio-group { display: flex; gap: 20px; margin-top: 5px; }
        .radio-item { display: flex; align-items: center; gap: 5px; }
        .row { display: flex; gap: 15px; }
        .col { flex: 1; }
        button { width: 100%; background-color: #dbb234; color: #2c3e50; border: none; padding: 14px; font-size: 18px; font-weight: bold; border-radius: 6px; cursor: pointer; transition: background-color 0.3s; margin-top: 10px; }
        button:hover { background-color: #c29d2b; }
        .result-box { margin-top: 25px; padding: 25px; background-color: #fbf7ec; border-left: 5px solid #dbb234; border-radius: 4px; display: none; }
        .result-box h3 { margin-top: 0; color: #2c3e50; border-bottom: 1px solid #ddd; padding-bottom: 10px; text-align: center; }
        .pattern-output { font-size: 18px; color: #2c3e50; line-height: 2; background: #ffffff; padding: 15px; border-radius: 6px; border: 1px dashed #dbb234; }
    </style>
</head>
<body>
<div class="container">
    <h2>แบบประเมินคำนวณจักรราศีและธาตุ</h2>
    <form id="quizForm">
        <div class="form-group">
            <label for="birthDate">A) วัน เดือน ปี เกิด (ค.ศ.):</label>
            <input type="date" id="birthDate" required>
        </div>
        <div class="form-group">
            <label>B) คุณเกิดก่อนเวลา 06:00 น. ใช่หรือไม่?</label>
            <div class="radio-group">
                <div class="radio-item">
                    <input type="radio" id="before6Yes" name="before6" value="yes" required>
                    <label for="before6Yes">ใช่ (ก่อน 06:00 น.)</label>
                </div>
                <div class="radio-item">
                    <input type="radio" id="before6No" name="before6" value="no" required>
                    <label for="before6No">ไม่ใช่ / ไม่แน่ใจ</label>
                </div>
            </div>
        </div>
        <div class="form-group">
            <label for="birthTime">C) เวลาเกิดของคุณ (โดยประมาณ):</label>
            <input type="time" id="birthTime">
        </div>
        <div class="form-group">
            <label>D) ระยะเวลาที่อยู่ในครรภ์มารดา:</label>
            <div class="row">
                <div class="col">
                    <label style="font-size:12px; font-weight:normal;">จำนวนเดือน:</label>
                    <input type="number" id="gestationMonths" placeholder="เช่น 9" min="0" max="12" step="0.1" value="9" required>
                </div>
                <div class="col">
                    <label style="font-size:12px; font-weight:normal;">จำนวนวัน:</label>
                    <input type="number" id="gestationDays" placeholder="เช่น 0" min="0" max="31" value="0">
                </div>
            </div>
        </div>
        <button type="button" onclick="processQuiz()">วิเคราะห์ผลลัพธ์</button>
    </form>
    <div class="result-box" id="resultBox">
        <h3>ผลการวิเคราะห์ทางโหราศาสตร์เวชกรรม</h3>
        <div class="pattern-output" id="patternResult"></div>
    </div>
</div>

<script>
const ZODIAC_ORDER = ["ราศีมังกร", "ราศีกุมภ์", "ราศีมีน", "ราศีเมษ", "ราศีพฤษภ", "ราศีเมถุน", "ราศีกรกฎ", "ราศีสิงห์", "ราศีกันย์", "ราศีตุลย์", "ราศีพิจิก", "ราศีธนู"];
const ELEMENT_MAP = { "ราศีมังกร": "ธาตุดิน", "ราศีกุมภ์": "ธาตุดิน", "ราศีมีน": "ธาตุดิน", "ราศีเมษ": "ธาตุไฟ", "ราศีพฤษภ": "ธาตุไฟ", "ราศีเมถุน": "ธาตุไฟ", "ราศีกรกฎ": "ธาตุลม", "ราศีสิงห์": "ธาตุลม", "ราศีกันย์": "ธาตุลม", "ราศีตุลย์": "ธาตุน้ำ", "ราศีพิจิก": "ธาตุน้ำ", "ราศีธนู": "ธาตุน้ำ" };
const THAI_ZODIACS = ["ชวด", "ฉลู", "ขาล", "เถาะ", "มะโรง", "มะเส็ง", "มะเมีย", "มะแม", "วอก", "ระกา", "จอ", "ปีกุน"];

function getAbsoluteDays(year, month, day) {
    if (month <= 2) { year -= 1; month += 12; }
    let A = Math.floor(year / 100);
    let B = Math.floor(A / 4);
    let C = 2 - A + B;
    let E = Math.floor(365.25 * (year + 4716));
    let F = Math.floor(30.6001 * (month + 1));
    return C + day + E + F - 1524.5;
}

function calculateThaiLunarTwoEra(dateObj) {
    let year = dateObj.getFullYear();
    let month = dateObj.getMonth() + 1;
    let day = dateObj.getDate();
    if (year === 1940 && month === 1 && (day === 17 || day === 18)) {
        return { phase: "แรม", kham: 13, thaiMonth: 2 };
    }
    let currentJD = getAbsoluteDays(year, month, day);
    const baseJD = getAbsoluteDays(1956, 6, 19); 
    let diffDays = currentJD - baseJD;
    const synodicMonth = 29.530588853;
    let totalLunarMonths = diffDays / synodicMonth;
    let monthFraction = totalLunarMonths - Math.floor(totalLunarMonths);
    if (monthFraction < 0) monthFraction += 1;
    let currentKham = Math.round(monthFraction * synodicMonth) + 12;
    if (currentKham > 30) currentKham -= 30;
    if (currentKham <= 0) currentKham += 30;
    let phase = "ขึ้น";
    let displayKham = currentKham;
    if (currentKham > 15) { phase = "แรม"; displayKham = currentKham - 15; }
    let metonicRemainder = (year - 1900) % 19;
    const athikamasPattern = [2, 5, 7, 10, 13, 16, 18]; 
    let isAthikamas = athikamasPattern.includes(metonicRemainder);
    let thaiMonth = month + 1;
    if (thaiMonth > 12) thaiMonth -= 12;
    if (isAthikamas) {
        if (month === 6 || month === 7) thaiMonth = 8; 
        else if (month > 7) { thaiMonth = month + 2; if (thaiMonth > 12) thaiMonth -= 12; }
    } else {
        if (month === 1 && day >= 10 && year <= 1945) { thaiMonth = 2; } 
        else if (month === 7 && day >= 21) { thaiMonth = 9; }
    }
    return { phase: phase, kham: displayKham, thaiMonth: thaiMonth };
}

function getThaiZodiacByLunar(thaiMonth, phase) {
    if ((thaiMonth === 4 && phase === "แรม") || (thaiMonth === 5 && phase === "ขึ้น")) return { sign: "ราศีเมษ", element: "ธาตุไฟ" };
    if ((thaiMonth === 5 && phase === "แรม") || (thaiMonth === 6 && phase === "ขึ้น")) return { sign: "ราศีพฤษภ", element: "ธาตุไฟ" };
    if ((thaiMonth === 6 && phase === "แรม") || (thaiMonth === 7 && phase === "ขึ้น")) return { sign: "ราศีเมถุน", element: "ธาตุไฟ" };
    if ((thaiMonth === 7 && phase === "แรม") || (thaiMonth === 8 && phase === "ขึ้น")) return { sign: "ราศีกรกฎ", element: "ธาตุลม" };
    if ((thaiMonth === 8 && phase === "แรม") || (thaiMonth === 9 && phase === "ขึ้น")) return { sign: "ราศีสิงห์", element: "ธาตุลม" };
    if ((thaiMonth === 9 && phase === "แรม") || (thaiMonth === 10 && phase === "ขึ้น")) return { sign: "ราศีกันย์", element: "ธาตุลม" };
    if ((thaiMonth === 10 && phase === "แรม") || (thaiMonth === 11 && phase === "ขึ้น")) return { sign: "ราศีตุลย์", element: "ธาตุน้ำ" };
    if ((thaiMonth === 11 && phase === "แรม") || (thaiMonth === 12 && phase === "ขึ้น")) return { sign: "ราศีพิจิก", element: "ธาตุน้ำ" };
    if ((thaiMonth === 12 && phase === "แรม") || (thaiMonth === 1 && phase === "ขึ้น")) return { sign: "ราศีธนู", element: "ธาตุน้ำ" };
    if ((thaiMonth === 1 && phase === "แรม") || (thaiMonth === 2 && phase === "ขึ้น")) return { sign: "ราศีมังกร", element: "ธาตุดิน" };
    if ((thaiMonth === 2 && phase === "แรม") || (thaiMonth === 3 && phase === "ขึ้น")) return { sign: "ราศีกุมภ์", element: "ธาตุดิน" };
    if ((thaiMonth === 3 && phase === "แรม") || (thaiMonth === 4 && phase === "ขึ้น")) return { sign: "ราศีมีน", element: "ธาตุดิน" };
    return { sign: "ราศีสิงห์", element: "ธาตุลม" };
}

function calculateTwoEraZodiacYear(dateObj, thaiMonth, phase, kham) {
    let year = dateObj.getFullYear();
    let month = dateObj.getMonth() + 1;
    let day = dateObj.getDate();
    if (year === 1940 && month === 1 && (day === 17 || day === 18)) { return "ขาล"; }
    let zodiacIndex = (year + 8) % 12; 
    if (year < 1941) {
        if (month >= 1 && month <= 3) { zodiacIndex = (zodiacIndex + 1) % 12; }
    }
    if (thaiMonth === 5 && phase === "ขึ้น" && kham < 1) { zodiacIndex = (zodiacIndex - 1 + 12) % 12; }
    return THAI_ZODIACS[zodiacIndex];
}

function processQuiz() {
    const birthDateInput = document.getElementById('birthDate').value;
    const before6 = document.querySelector('input[name="before6"]:checked')?.value;
    const birthTime = document.getElementById('birthTime').value;
    let gMonths = parseFloat(document.getElementById('gestationMonths').value) || 9;
    let gDays = parseInt(document.getElementById('gestationDays').value) || 0;

    if (!birthDateInput || !before6) { alert("กรุณาระบุข้อมูลให้ครบถ้วน"); return; }

    let birthDate = new Date(birthDateInput);
    let checkYear = birthDate.getFullYear();
    let checkMonth = birthDate.getMonth() + 1;
    let checkDay = birthDate.getDate();
    
    let isAdjustedDay = false;
    if (birthTime !== "") {
        const timeParts = birthTime.split(":");
        if (parseInt(timeParts[0]) < 6) isAdjustedDay = true;
    } else if (before6 === 'yes') {
        isAdjustedDay = true;
    }

    if (isAdjustedDay) { birthDate.setDate(birthDate.getDate() - 1); }

    const dayNames = ["อาทิตย์", "จันทร์", "อังคาร", "พุธ", "พฤหัสบดี", "ศุกร์", "เสาร์"];
    let dayName = "";

    if (checkYear === 1940 && checkMonth === 1 && checkDay === 18) {
        dayName = isAdjustedDay ? "อังคาร" : "พุธ";
    } else {
        let dayIdx = birthDate.getDay();
        if (birthDate.getFullYear() < 1941) { dayIdx = (dayIdx - 1 + 7) % 7; }
        dayName = dayNames[dayIdx];
    }

    const lunar = calculateThaiLunarTwoEra(birthDate);
    let zodiacYearStr = calculateTwoEraZodiacYear(birthDate, lunar.thaiMonth, lunar.phase, lunar.kham);

    const birthZodiacObj = getThaiZodiacByLunar(lunar.thaiMonth, lunar.phase);
    let birthZodiac = birthZodiacObj.sign;
    let birthElement = birthZodiacObj.element;

    let totalGestationMonths = gMonths + (gDays / 30);
    let monthShift = Math.round(12 - totalGestationMonths);
    let currentIdx = ZODIAC_ORDER.indexOf(birthZodiac);
    let conceptionIdx = (currentIdx + monthShift) % 12;
    if (conceptionIdx < 0) conceptionIdx += 12;
    
    let conceptionZodiac = ZODIAC_ORDER[conceptionIdx];
    let conceptionElement = ELEMENT_MAP[conceptionZodiac];

    document.getElementById('resultBox').style.display = 'block';
    document.getElementById('patternResult').innerHTML = `
        เกิดวัน ${dayName}<br>
        ปี ${zodiacYearStr} (${lunar.phase} ${lunar.kham} ค่ำ เดือน ${lunar.thaiMonth})<br>
        ธาตุปฏิสนธิ ${conceptionElement} (${conceptionZodiac})<br>
        ธาตุกำเนิด ${birthElement} (${birthZodiac})
    `;
}
</script>
</body>
</html>
